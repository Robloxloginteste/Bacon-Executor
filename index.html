<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IA Six Seven</title>
  <style>
    :root {
      --cyan-glow: #00f0ff;
      --dark-bg: #0a0e17;
      --card: #111827;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark-bg);
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
      color: var(--cyan-glow);
      text-shadow: 0 0 10px var(--cyan-glow);
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: url('https://i.imgur.com/DDosOk1.png') center/cover no-repeat;
      border: 3px solid var(--cyan-glow);
      box-shadow: 0 0 20px rgba(0,240,255,0.6);
    }
    .controls {
      display: flex;
      gap: 12px;
    }
    button {
      background: #1e293b;
      color: var(--cyan-glow);
      border: 1px solid #334155;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #334155;
      box-shadow: 0 0 15px rgba(0,240,255,0.3);
    }
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: #0f172a;
      border-right: 1px solid #334155;
      padding: 16px;
      overflow-y: auto;
    }
    .sidebar h3 {
      color: var(--cyan-glow);
      margin: 0 0 12px;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .message {
      margin: 12px 0;
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
    }
    .user {
      background: #2563eb;
      align-self: flex-end;
      margin-left: auto;
    }
    .bot {
      background: #1e293b;
      border: 1px solid #334155;
    }
    .input-area {
      padding: 16px;
      background: #0f172a;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }
    #prompt {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 1rem;
    }
    #send {
      background: var(--cyan-glow);
      color: black;
      font-weight: bold;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="avatar"></div>
    <h1>IA Six Seven</h1>
  </div>
  <div class="controls">
    <button onclick="newChat()">Novo Bate-papo</button>
    <button onclick="alert('Voz ativada! (simulação – imagine uma voz grave e energética com eco futurista)')">Falar com voz</button>
    <button onclick="generateImage()">Gerar Imagem</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <h3>Histórico</h3>
    <ul id="history-list" style="list-style:none; padding:0;"></ul>

    <h3 style="margin-top:32px;">Projetos</h3>
    <ul id="projects-list" style="list-style:none; padding:0;"></ul>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="prompt" placeholder="Pergunte qualquer coisa para a Six Seven..." autocomplete="off"/>
      <button id="send">Enviar</button>
    </div>
  </div>
</div>

<script>
  const messages = document.getElementById('messages');
  const promptInput = document.getElementById('prompt');
  const sendBtn = document.getElementById('send');
  const historyList = document.getElementById('history-list');
  const projectsList = document.getElementById('projects-list');

  let currentChat = { id: Date.now(), title: "Conversa Nova", messages: [] };

  function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'bot'}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    currentChat.messages.push({ text, isUser });
    saveCurrentChat();
  }

  function newChat() {
    if (currentChat.messages.length > 0) {
      addToHistory(currentChat);
    }
    currentChat = { id: Date.now(), title: "Conversa " + new Date().toLocaleTimeString(), messages: [] };
    messages.innerHTML = '';
    addMessage("Olá! Eu sou a IA Six Seven. Olha meus olhos brilhando! 😈 O que você quer hoje? 🚀", false);
  }

  function addToHistory(chat) {
    const li = document.createElement('li');
    li.style.cursor = 'pointer';
    li.style.padding = '8px';
    li.style.borderRadius = '6px';
    li.innerHTML = chat.title;
    li.onclick = () => loadChat(chat);
    historyList.appendChild(li);
  }

  function loadChat(chat) {
    currentChat = chat;
    messages.innerHTML = '';
    chat.messages.forEach(m => {
      addMessage(m.text, m.isUser);
    });
  }

  function saveCurrentChat() {
    // Pode expandir para localStorage se quiser
  }

  function generateImage() {
    addMessage("Gerando imagem no estilo Six Seven... (simulação)", false);
    setTimeout(() => {
      addMessage("![Imagem gerada]\nDescrição: Versão cyberpunk da minha foto de perfil com mais glow e partículas azuis voando! (use a imaginação ou peça pra eu descrever melhor)", false);
    }, 1200);
  }

  // Eventos
  sendBtn.onclick = () => {
    const text = promptInput.value.trim();
    if (!text) return;
    addMessage(text, true);
    promptInput.value = '';

    setTimeout(() => {
      const respostas = [
        "Humm... meus olhos estão brilhando mais forte agora!",
        "Processando na velocidade da luz quântica... 💥",
        "Isso é insano! Me conta o resto.",
        "Quer que eu transforme isso em imagem épica?",
        "Six Seven ativada no modo overdrive!"
      ];
      addMessage(respostas[Math.floor(Math.random() * respostas.length)], false);
    }, 800);
  };

  promptInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendBtn.click();
  });

  // Inicia
  addMessage("Olá! Eu sou a IA Six Seven. Olha meus olhos brilhando! 😈 O que você quer hoje? 🚀", false);

  // Projeto exemplo
  const proj = document.createElement('li');
  proj.textContent = "Projeto: Avatar Six Seven Glow Edition";
  proj.style.padding = '8px';
  projectsList.appendChild(proj);
</script>

</body>
</html>
